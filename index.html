<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoraRepo</title>

  <style>
    /* リセット */
    body {
      margin: 0;
      font-family: sans-serif;
    }

    /* ヘッダー */
    header {
      background: rgba(0,0,0,0.6);
      color: white;
      position: fixed;
      width: 100%;
      z-index: 10;
    }

    .container {
      width: 90%;
      margin: 0 auto;
    }

    .header-left {
      float: left;
    }


    .header-right {
      float: right;
    }

    .header-right a {
      color: white;
      margin-left: 20px;
      line-height: 60px;
      text-decoration: none;
    }

    /* トップ（動画） */
    .top-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .top-wrapper .container {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      padding-top: 200px;
    }

    .top-wrapper h1 {
      font-size: 50px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin-top: 10px;
      background: orange;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    /* 下のセクション（簡易） */
    .lesson-wrapper {
      padding: 50px 0;
      text-align: center;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px 0;
    }

    /* float解除 */
    header::after {
      content: "";
      display: block;
      clear: both;
    }
  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header>
    <div class="container">
      <div class="header-left">
        <img class="logo" src="https://prog-8.com/images/html/advanced/main_logo.png">
      </div>
      <div class="header-right">
     
      </div>
    </div>
  </header>

  <!-- トップ動画 -->
  <div class="top-wrapper">
    <div class="video-container">
      <iframe 
        src="https://player.vimeo.com/video/1175464235?h=5c5ab677d7&autoplay=1&loop=1&muted=1&background=1"
        frameborder="0"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>

    <div class="container">
      <h1>SoraRepo<br>Heavy Snow</h1>
      <p>動画背景のトップページサンプルです</p>
      <a href="https://storymaps.arcgis.com/collections/3e93c1b9febf43f0bc8a388d12e66356" class="btn">過去のSoraRepoはこちら</a>
    </div>
  </div>

  <!-- 下コンテンツ -->
  <div class="lesson-wrapper">
    <div class="container">
      <h2>Learn from Taku!</h2>
      <p>Learn from Koji</p>
    </div>
  </div>

  <!-- フッター -->
  <footer>
    <p>To be Shimiken.</p>
  </footer>

</body>
</html>
